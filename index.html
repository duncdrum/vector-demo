<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Vector Search Demo</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 40rem; margin: 2rem auto; }
        input[type="text"] { width: 100%; padding: 0.5rem; }
        button { padding: 0.5rem 1rem; margin-top: 0.5rem; }
        #results { margin-top: 1.5rem; }
        .hit { padding: 0.5rem; border-bottom: 1px solid #eee; }
        .score { color: #666; font-size: 0.9rem; }
    </style>
</head>
<body>
    <h1>Vector Search Demo</h1>
    <p>Enter a natural language query; results are ranked by semantic similarity.</p>
    <input type="text" id="q" placeholder="e.g. machine learning and databases"/>
    <button id="go">Search</button>
    <div id="results"></div>

    <script>
        document.getElementById("go").onclick = function () {
            var q = document.getElementById("q").value.trim();
            if (!q) return;
            var results = document.getElementById("results");
            results.innerHTML = "Searching...";
            fetch("search?q=" + encodeURIComponent(q))
                .then(function (r) { return r.json(); })
                .then(function (arr) {
                    results.innerHTML = arr.length === 0
                        ? "<p>No results.</p>"
                        : arr.map(function (o) {
                            return "<div class='hit'><strong>" + o.title + "</strong><span class='score'> score: " + o.score + "</span></div>";
                        }).join("");
                })
                .catch(function (e) {
                    results.innerHTML = "<p>Error: " + e.message + "</p>";
                });
        };
    </script>
</body>
</html>
